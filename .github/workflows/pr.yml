# Pull-request checks: fast feedback for developers. Validates the PR title as
# a Conventional Commit (it becomes the squash-merge commit and feeds the
# changelog) and runs the full quality-gate suite.
name: PR

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  title:
    name: PR title (Conventional Commits)
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    steps:
      - uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Keep in sync with cliff.toml's commit groups.
          types: |
            feat
            fix
            perf
            refactor
            docs
            test
            style
            build
            ci
            chore
            revert

  verify:
    name: Verify
    uses: ./.github/workflows/verify.yml
