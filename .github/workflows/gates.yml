# Reusable quality-gate workflow. Called by pr.yml, main.yml, and release.yml so
# the gate definition lives in exactly one place and can never drift between
# them — the CI counterpart to the local `bun run gates`.
name: Gates

on:
  workflow_call:

permissions:
  contents: read

jobs:
  gates:
    name: Quality gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # `bun run gates` runs the exact 11-gate suite developers run locally
      # (typecheck · check · lint · format · coverage · dup · deadcode · cycles
      # · boundaries · build · audit), collects every failure (not fail-fast),
      # and exits non-zero if any gate is red.
      - name: Run gate suite
        run: bun run gates
