# Tag-driven release pipeline (triggered by pushing a v* tag). In order:
#   1. guard            — the tag must match package.json's version
#   2. verify           — the full quality-gate suite
#   3. release          — build the image once, scan it with Trivy, push the
#                         versioned tags, then draft a GitHub Release whose
#                         notes are generated from Conventional Commits
#   4. update-changelog — regenerate CHANGELOG.md and commit it to main
#
# The release is created as a DRAFT for human review before publishing.
name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  guard:
    name: Tag ↔ version guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Tag must match package.json version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pkg="$(grep -m1 '"version"' package.json | sed -E 's/.*"version"[[:space:]]*:[[:space:]]*"([^"]+)".*/\1/')"
          echo "tag=$tag  package.json=$pkg"
          if [ "$tag" != "$pkg" ]; then
            echo "::error::Tag $GITHUB_REF_NAME (=$tag) does not match package.json version $pkg. Bump package.json or fix the tag."
            exit 1
          fi

  verify:
    name: Verify
    uses: ./.github/workflows/verify.yml

  release:
    name: Build, scan & draft release
    needs: [guard, verify]
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub Release
      packages: write # push the image to GHCR
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # full history so git-cliff can build the changelog

      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      # Build once into the local daemon (with gha cache) so Trivy can scan the
      # exact image before it is published.
      - name: Build image (local, for scan)
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-to: type=gha,mode=max

      - name: Scan image (Trivy)
        # SHA-pinned (= v0.36.0): trivy-action has a documented tag-compromise
        # history, so this third-party action is pinned to an immutable commit.
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          image-ref: ${{ fromJSON(steps.meta.outputs.json).tags[0] }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: CRITICAL,HIGH

      # Reuses the cached layers from the build above — no rebuild, just push.
      - name: Push image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha

      - name: Generate release notes
        id: notes
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create draft release
        uses: softprops/action-gh-release@v3
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          draft: true
          body: ${{ steps.notes.outputs.content }}

  update-changelog:
    name: Update CHANGELOG.md
    needs: [release]
    runs-on: ubuntu-latest
    permissions:
      contents: write # commit CHANGELOG.md back to main
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Generate CHANGELOG.md
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --tag ${{ github.ref_name }} --output CHANGELOG.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- CHANGELOG.md; then
            echo "CHANGELOG.md unchanged — nothing to commit."
          else
            git add CHANGELOG.md
            git commit -m "docs(changelog): update for ${{ github.ref_name }} [skip ci]"
            git push origin main
          fi
