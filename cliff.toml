# git-cliff configuration — turns Conventional Commits into the changelog and
# the GitHub Release notes. Used by .github/workflows/release.yml.
# Reference: https://git-cliff.org/docs/configuration

[changelog]
header = """
# Changelog

All notable changes to this project are documented in this file.
Commit conventions follow [Conventional Commits](https://www.conventionalcommits.org).
"""
body = """
{% if version -%}
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else -%}
    ## [Unreleased]
{% endif -%}
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | upper_first }}
    {% for commit in commits %}
        - {% if commit.scope %}**{{ commit.scope }}:** {% endif %}{{ commit.message | upper_first }}\
    {% endfor %}
{% endfor %}
"""
trim = true
footer = ""

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
protect_breaking_commits = true
filter_commits = false
tag_pattern = "v[0-9]*"
topo_order = false
sort_commits = "newest"
commit_parsers = [
  { message = "^chore\\(release\\)", skip = true },
  { message = "^chore\\(changelog\\)", skip = true },
  { message = "^docs\\(changelog\\)", skip = true },
  { message = "^feat", group = "🚀 Features" },
  { message = "^fix", group = "🐛 Bug Fixes" },
  { message = "^perf", group = "⚡ Performance" },
  { message = "^refactor", group = "♻️ Refactoring" },
  { message = "^doc", group = "📚 Documentation" },
  { message = "^test", group = "🧪 Testing" },
  { message = "^style", group = "🎨 Styling" },
  { message = "^build", group = "📦 Build & Tooling" },
  { message = "^ci", group = "⚙️ CI/CD" },
  { message = "^chore", group = "🧹 Chores" },
  { message = ".*", group = "📌 Other" },
]
