[test]
preload = ["./src/test-setup.ts"]

# Collect coverage on every `bun test` for visibility. NOTE: Bun 1.3.x does not
# enforce coverageThreshold (it reports but does not fail), so this is a target,
# not a hard gate — current floor ~78% lines / 82% funcs. Octokit/network I/O
# wrappers (github.ts) and deep pipeline orchestration (migration.ts) are
# intentionally excluded as integration-tested concerns; don't chase them here.
coverage = true
coverageThreshold = { line = 0.78, function = 0.80 }
